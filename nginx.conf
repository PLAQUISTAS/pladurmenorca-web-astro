upstream astro_backend {
    server 127.0.0.1:4321;
}

limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=2r/s;

# Markdown-for-Agents content negotiation (RFC 8288 / RFC 7231 q-values)
# Agents sending `Accept: text/markdown` get the .md variant; browsers get HTML.
# Honors q-values: si markdown lleva q=0.x explícito, HTML gana (mayor preferencia
# implícita q=1). Cubre el caso `Accept: text/html, text/markdown;q=0.5`.
map $http_accept $prefers_md {
    default                               0;
    "~*text/markdown\s*;\s*q=0(\.\d+)?"   0;
    "~*text/markdown"                     1;
}

server {
    listen 80;
    server_name pladurmenorca.com www.pladurmenorca.com;
    server_tokens off;
    client_max_body_size 25m;

    root /app/dist/client;
    index index.html;

    # ── Security headers ──────────────────────────────────
    # Gestionados por Traefik (security-headers middleware)
    # Si se necesitan cambios, modificar en Dokploy → Traefik dynamic config

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── Allow .well-known (security.txt, agent-skills/, mcp/, etc.) ──
    # Declaramos mime types manualmente para este scope porque .md no
    # está en los defaults y SKILL.md debe servirse como text/markdown.
    location ^~ /.well-known/ {
        allow all;
        types {
            text/markdown      md;
            application/json   json;
            text/plain         txt;
            application/xml    xml;
        }
        default_type application/octet-stream;
        charset utf-8;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri $uri/ =404;
    }

    # ── Block hidden files (.git, .env, .htaccess) ───────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── API routes → Node.js backend ─────────────────────
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://astro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Hashed assets (_astro/) → 1 year cache ───────────
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ── Static assets → 1 year cache ─────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # ── Videos → 1 year cache + range requests ───────────
    location /videos/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Accept-Ranges bytes;
        access_log off;
    }

    # ── Sitemap, robots → 1 day cache ────────────────────
    location ~* ^/(sitemap.*\.xml|robots\.txt|llms.*\.txt)$ {
        expires 1d;
        add_header Cache-Control "public, stale-while-revalidate=604800" always;
    }

    # ── Trailing slash → 301 redirect (antes de Astro) ───
    # /contacto/ → 301 → /contacto  (elimina contenido duplicado)
    location ~ ^/(.+)/$ {
        return 301 /$1;
    }

    # ── HTML pages → static first, Node.js fallback ──────
    location / {
        limit_req zone=general burst=20 nodelay;
        add_header Cache-Control "no-cache" always;
        add_header Vary "Accept" always;

        # Agent sent `Accept: text/markdown`? intento servir el .md equivalente
        if ($prefers_md = 1) {
            rewrite ^ /__md$request_uri last;
        }

        try_files $uri $uri/index.html $uri.html @astro;
    }

    # ── Markdown variants (RFC 8288 content negotiation) ──
    # Servido solo vía rewrite interno desde `location /`.
    # IMPORTANTE: usamos `^~` (preferred prefix) para ganar prioridad frente al regex
    # del trailing-slash redirect (`location ~ ^/(.+)/$`). Sin `^~` la URI `/__md/`
    # cae en el regex y devuelve 301 → rompe la negotiation en la home.
    # Astro genera .md como `/page/index.md`; probamos ambos paths por si el futuro cambia.
    location ^~ /__md/ {
        internal;
        alias /app/dist/client/;
        default_type text/markdown;
        charset utf-8;
        add_header Cache-Control "no-cache" always;
        add_header Vary "Accept" always;
        try_files $uri/index.md $uri.md @md_missing;
    }

    location @md_missing {
        # .md no existe para esta URL → descartar el prefijo y servir HTML normal
        rewrite ^/__md(.*)$ $1 break;
        try_files $uri $uri/index.html $uri.html @astro;
    }

    # ── Fallback: redirects, 404s, SSR → Node.js ────────
    location @astro {
        proxy_pass http://astro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
